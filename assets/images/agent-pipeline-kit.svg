<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Background -->
  <rect width="800" height="450" rx="8" fill="#191414"/>

  <!-- Window chrome -->
  <rect x="0" y="0" width="800" height="32" rx="8" fill="#232323"/>
  <rect x="0" y="16" width="800" height="16" fill="#232323"/>
  <circle cx="20" cy="16" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="16" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="16" r="6" fill="#28C840"/>
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#727272">agent-pipeline-kit — ~/projects</text>

  <!-- Terminal content area -->
  <rect x="16" y="44" width="768" height="394" rx="4" fill="#121212"/>

  <!-- Install command -->
  <text x="28" y="68" font-family="monospace" font-size="12" fill="#1DB954">$</text>
  <text x="44" y="68" font-family="monospace" font-size="12" fill="#FFFFFF"> npx agent-pipeline-kit init my-app</text>

  <!-- Output -->
  <text x="28" y="92" font-family="monospace" font-size="11" fill="#727272">Installing 8-agent SDLC pipeline...</text>

  <!-- File tree -->
  <text x="28" y="118" font-family="monospace" font-size="11" fill="#FFFFFF">my-app/</text>
  <text x="44" y="136" font-family="monospace" font-size="11" fill="#B3B3B3">├── .claude/</text>
  <text x="60" y="154" font-family="monospace" font-size="11" fill="#B3B3B3">│   └── agents/</text>
  <text x="76" y="172" font-family="monospace" font-size="11" fill="#1DB954">│       ├── 01-solution-architect.md</text>
  <text x="76" y="190" font-family="monospace" font-size="11" fill="#1DB954">│       ├── 02-requirements-agent.md</text>
  <text x="76" y="208" font-family="monospace" font-size="11" fill="#1DB954">│       ├── 03-project-manager.md</text>
  <text x="76" y="226" font-family="monospace" font-size="11" fill="#1DB954">│       ├── 04-coding-agent.md</text>
  <text x="76" y="244" font-family="monospace" font-size="11" fill="#E07C3E">│       ├── 05-code-review.md</text>
  <text x="76" y="262" font-family="monospace" font-size="11" fill="#E07C3E">│       ├── 06-security-review.md</text>
  <text x="76" y="280" font-family="monospace" font-size="11" fill="#D4A843">│       ├── 07-ci-cd-integration.md</text>
  <text x="76" y="298" font-family="monospace" font-size="11" fill="#D4A843">│       └── 08-project-summary.md</text>
  <text x="44" y="316" font-family="monospace" font-size="11" fill="#B3B3B3">├── docs/</text>
  <text x="60" y="334" font-family="monospace" font-size="11" fill="#727272">│   ├── backlog/</text>
  <text x="60" y="352" font-family="monospace" font-size="11" fill="#727272">│   └── project-plan.md</text>
  <text x="44" y="370" font-family="monospace" font-size="11" fill="#B3B3B3">└── CLAUDE.md</text>

  <!-- Divider -->
  <rect x="28" y="386" width="744" height="1" fill="#333"/>

  <!-- Success message -->
  <text x="28" y="410" font-family="monospace" font-size="12" fill="#1DB954">&#10003; 8 agents installed. Run 'claude' to start your pipeline.</text>
  <text x="28" y="428" font-family="monospace" font-size="11" fill="#727272">github.com/brett-hardiman/agent-pipeline-kit</text>
</svg>
