<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Background -->
  <rect width="800" height="450" rx="8" fill="#191414"/>

  <!-- Window chrome -->
  <rect x="0" y="0" width="800" height="32" rx="8" fill="#232323"/>
  <rect x="0" y="16" width="800" height="16" fill="#232323"/>
  <circle cx="20" cy="16" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="16" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="16" r="6" fill="#28C840"/>
  <text x="400" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#727272">Requirements API — POST /generate</text>

  <!-- Sidebar -->
  <rect x="0" y="32" width="220" height="418" fill="#121212"/>
  <rect x="220" y="32" width="1" height="418" fill="#333"/>

  <!-- Sidebar title -->
  <text x="20" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Requirements API</text>
  <rect x="20" y="72" width="180" height="1" fill="#333"/>

  <!-- Endpoints label -->
  <text x="20" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#B3B3B3">Endpoints</text>

  <!-- Endpoint rows -->
  <rect x="20" y="112" width="180" height="32" rx="4" fill="#232323"/>
  <rect x="28" y="120" width="40" height="16" rx="3" fill="#1DB954"/>
  <text x="48" y="132" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#191414">POST</text>
  <text x="76" y="132" font-family="monospace" font-size="11" fill="#FFFFFF">/generate</text>

  <rect x="20" y="150" width="180" height="32" rx="4" fill="#121212" stroke="#333" stroke-width="1"/>
  <rect x="28" y="158" width="40" height="16" rx="3" fill="#232323" stroke="#1DB954" stroke-width="1"/>
  <text x="48" y="170" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#1DB954">GET</text>
  <text x="76" y="170" font-family="monospace" font-size="11" fill="#B3B3B3">/epics/{id}</text>

  <rect x="20" y="188" width="180" height="32" rx="4" fill="#121212" stroke="#333" stroke-width="1"/>
  <rect x="28" y="196" width="40" height="16" rx="3" fill="#232323" stroke="#1DB954" stroke-width="1"/>
  <text x="48" y="208" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#1DB954">GET</text>
  <text x="76" y="208" font-family="monospace" font-size="11" fill="#B3B3B3">/stories</text>

  <!-- Pipeline label -->
  <text x="20" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#B3B3B3">Pipeline</text>
  <text x="20" y="276" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF">Doc</text>
  <text x="60" y="276" font-family="monospace" font-size="11" fill="#727272">→</text>
  <text x="76" y="276" font-family="system-ui, sans-serif" font-size="11" fill="#1DB954">LLM</text>
  <text x="116" y="276" font-family="monospace" font-size="11" fill="#727272">→</text>
  <text x="132" y="276" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF">JSON</text>

  <!-- Sidebar footer -->
  <text x="20" y="420" font-family="system-ui, sans-serif" font-size="9" fill="#727272">FastAPI + spaCy + Claude</text>
  <text x="20" y="435" font-family="system-ui, sans-serif" font-size="9" fill="#727272">v1.0 · OpenAPI 3.1</text>

  <!-- Main content - Request -->
  <text x="240" y="60" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#B3B3B3">REQUEST</text>
  <rect x="240" y="68" width="540" height="84" rx="6" fill="#232323"/>
  <text x="256" y="90" font-family="monospace" font-size="11" fill="#1DB954">POST</text>
  <text x="294" y="90" font-family="monospace" font-size="11" fill="#FFFFFF">/generate</text>
  <text x="256" y="112" font-family="monospace" font-size="11" fill="#B3B3B3">{</text>
  <text x="270" y="128" font-family="monospace" font-size="11" fill="#D4A843">"document"</text>
  <text x="345" y="128" font-family="monospace" font-size="11" fill="#B3B3B3">:</text>
  <text x="355" y="128" font-family="monospace" font-size="11" fill="#1DB954">"auth-spec.pdf"</text>
  <text x="256" y="144" font-family="monospace" font-size="11" fill="#B3B3B3">}</text>

  <!-- Response label -->
  <text x="240" y="178" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#B3B3B3">RESPONSE</text>
  <rect x="744" y="166" width="36" height="16" rx="3" fill="#1DB954"/>
  <text x="762" y="178" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#191414">200</text>

  <!-- Response body -->
  <rect x="240" y="186" width="540" height="240" rx="6" fill="#232323"/>
  <text x="256" y="208" font-family="monospace" font-size="11" fill="#B3B3B3">{</text>
  <text x="270" y="224" font-family="monospace" font-size="11" fill="#D4A843">"epic"</text>
  <text x="312" y="224" font-family="monospace" font-size="11" fill="#B3B3B3">:</text>
  <text x="322" y="224" font-family="monospace" font-size="11" fill="#1DB954">"User Authentication"</text>
  <text x="262" y="240" font-family="monospace" font-size="11" fill="#B3B3B3">,</text>
  <text x="270" y="240" font-family="monospace" font-size="11" fill="#D4A843">"stories"</text>
  <text x="328" y="240" font-family="monospace" font-size="11" fill="#B3B3B3">: [</text>
  <text x="284" y="256" font-family="monospace" font-size="11" fill="#B3B3B3">{</text>
  <text x="298" y="272" font-family="monospace" font-size="11" fill="#D4A843">"as_a"</text>
  <text x="340" y="272" font-family="monospace" font-size="11" fill="#B3B3B3">:</text>
  <text x="350" y="272" font-family="monospace" font-size="11" fill="#1DB954">"registered user"</text>
  <text x="290" y="288" font-family="monospace" font-size="11" fill="#B3B3B3">,</text>
  <text x="298" y="288" font-family="monospace" font-size="11" fill="#D4A843">"i_want"</text>
  <text x="354" y="288" font-family="monospace" font-size="11" fill="#B3B3B3">:</text>
  <text x="364" y="288" font-family="monospace" font-size="11" fill="#1DB954">"to log in with MFA"</text>
  <text x="290" y="304" font-family="monospace" font-size="11" fill="#B3B3B3">,</text>
  <text x="298" y="304" font-family="monospace" font-size="11" fill="#D4A843">"acceptance"</text>
  <text x="376" y="304" font-family="monospace" font-size="11" fill="#B3B3B3">: [</text>
  <text x="312" y="320" font-family="monospace" font-size="11" fill="#1DB954">"GIVEN valid credentials"</text>
  <text x="312" y="336" font-family="monospace" font-size="11" fill="#1DB954">"WHEN user submits MFA code"</text>
  <text x="312" y="352" font-family="monospace" font-size="11" fill="#1DB954">"THEN session is created"</text>
  <text x="298" y="368" font-family="monospace" font-size="11" fill="#B3B3B3">]</text>
  <text x="284" y="384" font-family="monospace" font-size="11" fill="#B3B3B3">}</text>
  <text x="270" y="400" font-family="monospace" font-size="11" fill="#B3B3B3">]</text>
  <text x="256" y="416" font-family="monospace" font-size="11" fill="#B3B3B3">}</text>
</svg>
