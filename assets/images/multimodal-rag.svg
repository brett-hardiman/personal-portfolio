  <text x="456" y="149" font-family="monospace" font-size="9" fill="#727272">def authenticate(token, mfa_code)</text>
  <rect x="712" y="130" width="48" height="16" rx="3" fill="#1DB954"/>
  <text x="736" y="142" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#191414">0.94</text>

  <!-- result 2 -->
  <rect x="440" y="162" width="332" height="34" rx="4" fill="#1C1C1C"/>
  <rect x="440" y="162" width="3" height="34" rx="1.5" fill="#1DB954" opacity="0.7"/>
  <text x="456" y="176" font-family="monospace" font-size="10" fill="#FFFFFF">security-spec.pdf</text>
  <text x="456" y="189" font-family="monospace" font-size="9" fill="#727272">§3.2 — MFA challenge &amp; session issuance</text>
  <rect x="712" y="170" width="48" height="16" rx="3" fill="#232323" stroke="#1DB954" stroke-width="1"/>
  <text x="736" y="182" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#1DB954">0.91</text>

  <!-- result 3 -->
  <rect x="440" y="202" width="332" height="34" rx="4" fill="#1C1C1C"/>
  <rect x="440" y="202" width="3" height="34" rx="1.5" fill="#1DB954" opacity="0.5"/>
  <text x="456" y="216" font-family="monospace" font-size="10" fill="#FFFFFF">architecture.png</text>
  <text x="456" y="229" font-family="monospace" font-size="9" fill="#727272">diagram — token exchange sequence</text>
  <rect x="712" y="210" width="48" height="16" rx="3" fill="#232323" stroke="#1DB954" stroke-width="1"/>
  <text x="736" y="222" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#1DB954">0.88</text>

  <!-- result 4 -->
  <rect x="440" y="242" width="332" height="34" rx="4" fill="#1C1C1C"/>
  <rect x="440" y="242" width="3" height="34" rx="1.5" fill="#1DB954" opacity="0.35"/>
  <text x="456" y="256" font-family="monospace" font-size="10" fill="#FFFFFF">notes/auth-decisions.md</text>
  <text x="456" y="269" font-family="monospace" font-size="9" fill="#727272">why we chose short-lived JWTs</text>
  <rect x="712" y="250" width="48" height="16" rx="3" fill="#232323" stroke="#1DB954" stroke-width="1"/>
  <text x="736" y="262" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#1DB954">0.85</text>

  <!-- Divider -->
  <rect x="28" y="386" width="744" height="1" fill="#333"/>

  <!-- MCP grounded answer -->
  <text x="28" y="410" font-family="monospace" font-size="12" fill="#1DB954">&#10003; 4 sources retrieved via MCP — answer grounded in your files.</text>
  <text x="28" y="428" font-family="monospace" font-size="11" fill="#727272">github.com/brett-hardiman/multi-modal-rag-project</text>
