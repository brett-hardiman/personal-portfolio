  <text x="28" y="112" font-family="monospace" font-size="10" fill="#727272">SOURCES</text>

  <!-- code -->
  <rect x="28" y="122" width="150" height="26" rx="4" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="1"/>
  <rect x="36" y="129" width="34" height="12" rx="2" fill="#1DB954"/>
  <text x="53" y="138" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#191414">.py</text>
  <text x="78" y="139" font-family="monospace" font-size="10" fill="#B3B3B3">code</text>
