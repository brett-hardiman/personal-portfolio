  <text x="308" y="293" text-anchor="middle" font-family="monospace" font-size="9" fill="#B3B3B3">semantic + keyword</text>

  <!-- retrieve arrow -->
  <text x="392" y="187" font-family="monospace" font-size="16" fill="#727272">&#8594;</text>

