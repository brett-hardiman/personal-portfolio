  <circle cx="60" cy="16" r="6" fill="#28C840"/>
  <text x="400" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#727272">multimodal-rag — mcp://knowledge-base</text>

  <!-- Terminal content area -->
  <rect x="16" y="44" width="768" height="394" rx="4" fill="#121212"/>

