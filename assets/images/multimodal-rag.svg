  <rect x="28" y="154" width="150" height="26" rx="4" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="1"/>
  <rect x="36" y="161" width="34" height="12" rx="2" fill="#FF5F57"/>
  <text x="53" y="170" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#191414">.pdf</text>
  <text x="78" y="171" font-family="monospace" font-size="10" fill="#B3B3B3">PDFs</text>
  <!-- images -->
  <rect x="28" y="186" width="150" height="26" rx="4" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="1"/>
  <rect x="36" y="193" width="34" height="12" rx="2" fill="#FEBC2E"/>
  <text x="53" y="202" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#191414">.png</text>
  <text x="78" y="203" font-family="monospace" font-size="10" fill="#B3B3B3">images</text>
  <!-- notes -->
  <rect x="28" y="218" width="150" height="26" rx="4" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="1"/>
  <rect x="36" y="225" width="34" height="12" rx="2" fill="#D4A843"/>
  <text x="53" y="234" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#191414">.md</text>
  <text x="78" y="235" font-family="monospace" font-size="10" fill="#B3B3B3">notes</text>

  <!-- ingest arrow -->
  <text x="196" y="187" font-family="monospace" font-size="16" fill="#727272">&#8594;</text>

  <!-- ===== Stage 2: pgvector DB (center) ===== -->
  <text x="262" y="112" font-family="monospace" font-size="10" fill="#727272">EMBED + INDEX</text>

  <!-- Database cylinder -->
  <g>
    <path d="M 248 150 L 248 230 A 60 14 0 0 0 368 230 L 368 150" fill="#181D1A" stroke="#1DB954" stroke-width="1.5"/>
    <ellipse cx="308" cy="150" rx="60" ry="14" fill="#1F2A22" stroke="#1DB954" stroke-width="1.5"/>
    <ellipse cx="308" cy="180" rx="60" ry="14" fill="none" stroke="#1DB954" stroke-width="0.75" opacity="0.4"/>
    <ellipse cx="308" cy="206" rx="60" ry="14" fill="none" stroke="#1DB954" stroke-width="0.75" opacity="0.4"/>
