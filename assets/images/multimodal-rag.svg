  <text x="440" y="112" font-family="monospace" font-size="10" fill="#727272">RANKED RESULTS</text>

  <!-- result 1 -->
  <rect x="440" y="122" width="332" height="34" rx="4" fill="#232323"/>
  <rect x="440" y="122" width="3" height="34" rx="1.5" fill="#1DB954"/>
