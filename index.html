<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brett Hardiman — AI/ML Engineer & Agentic AI Specialist</title>

  <!-- SEO -->
  <meta name="description" content="Brett Hardiman — AI/ML Product Owner and AI Engineer specializing in agentic AI workflows, RAG applications, and LLM-powered tools. View projects and professional background.">
  <meta name="author" content="Brett Hardiman">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Brett Hardiman — AI/ML Product Owner & AI Engineer">
  <meta property="og:description" content="Portfolio showcasing AI/ML projects, agentic workflows, and professional experience at Booz Allen Hamilton.">
  <meta property="og:url" content="https://bretthardiman.com/">
  <meta property="og:image" content="https://bretthardiman.com/assets/images/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Brett Hardiman — AI/ML Product Owner & AI Engineer">
  <meta name="twitter:description" content="Portfolio showcasing AI/ML projects and agentic AI workflows.">
  <meta name="twitter:image" content="https://bretthardiman.com/assets/images/og-image.png">

  <!-- Theme color -->
  <meta name="theme-color" content="#17150f">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">

  <!-- Fonts (Instrument Serif is for the gallery placard / exhibition title) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <!-- Gallery shell styles only (this page does NOT load the portfolio's own
       stylesheet — the iframe loads styles.css for the portfolio itself). -->
  <link rel="stylesheet" href="css/gallery.css">

  <!-- When JS is disabled, send the visitor straight to the portfolio. -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=portfolio.html">
  </noscript>
</head>
<body>

  <!-- =============================================
       GALLERY SHELL
       Drives the zoom-into-portfolio experience.
       The actual portfolio lives at portfolio.html and is embedded
       below as an <iframe> inside the gilt frame.
       ============================================= -->
  <div id="gallery-track">
    <div id="gallery-stage">

      <div class="gallery-texture"></div>

      <div id="gallery-scene">
        <div id="frame-wrapper">
          <div class="art-frame">
            <div class="art-frame-inner">
              <iframe
                id="portfolio-iframe"
                src="portfolio.html?embedded=1"
                title="Brett Hardiman — Portfolio"
                loading="eager"
                referrerpolicy="same-origin"
              ></iframe>
            </div>
            <div class="art-reflection" aria-hidden="true"></div>
            <div class="gallery-placard">
              <p class="gallery-placard-title">The Professional Career of Brett Hardiman</p>
              <p class="gallery-placard-details">
                2021 &ndash; Present<br>
                Interactive digital portfolio, living work<br>
                <span class="gallery-placard-collection">The Hardiman Collection</span>
              </p>
            </div>
          </div>
        </div>
      </div>

      <div id="gallery-ambiance">
        <div class="gallery-spotlight"></div>
        <div class="gallery-vignette"></div>
      </div>

      <div id="gallery-glass"></div>

      <div id="gallery-header">
        <p class="gallery-header-label">The Hardiman Collection</p>
        <h2 class="gallery-header-title">A Working Retrospective</h2>
        <div id="gallery-scroll-hint">
          <span>Scroll to view</span>
          <span class="gallery-scroll-line"></span>
        </div>
      </div>

    </div>
  </div>

  <button id="gallery-return-chip" aria-label="Return to gallery">&larr; Gallery</button>

  <script src="js/gallery.js" defer></script>
</body>
</html>
